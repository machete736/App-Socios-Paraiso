name: app_socio_agua
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1  
    

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0  
  image_picker: ^1.0.7
  gal: ^2.3.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# Configuración para generar los logos automáticamente
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png" # Asegúrate de que este nombre coincida con tu imagen
  adaptive_icon_background: "#FFFFFF" # Color de fondo (puedes cambiar el hex)
  adaptive_icon_foreground: "assets/logo.png"


